services:
  db:
    image: postgres:15
    container_name: tool_issuance_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  #
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: tool_issuance_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000"

  bot:
    build:
        context: .
        dockerfile: Dockerfile
    container_name: tool_issuance_bot
    depends_on:
      - db
    env_file:
      - .env
    command: python bot/main.py

volumes:
  postgres_data: